<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="340" viewBox="0 0 1280 340" role="img" aria-label="langstage-hermes — closed-loop reflection and skill creation on LangGraph + deepagents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1221"/>
      <stop offset="1" stop-color="#121226"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7C5CFF"/>
      <stop offset="1" stop-color="#34D6C8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.15" r="0.6">
      <stop offset="0" stop-color="#7C5CFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#34D6C8"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#7C5CFF"/>
    </marker>
  </defs>

  <rect width="1280" height="340" rx="20" fill="url(#bg)"/>
  <rect width="1280" height="340" rx="20" fill="url(#glow)"/>
  <rect x="1" y="1" width="1278" height="338" rx="19" fill="none" stroke="#26284A" stroke-width="1.5"/>

  <!-- ===== left: identity ===== -->
  <text x="70" y="148" font-family="'SF Mono','JetBrains Mono','Consolas',monospace" font-size="56" font-weight="700" fill="#F2F6FC" letter-spacing="-1.5">langstage-<tspan fill="url(#accent)">hermes</tspan></text>

  <text x="72" y="194" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="22" fill="#A6AECB">Reflection &amp; skill creation that compound across sessions.</text>
  <text x="72" y="224" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="22" fill="#A6AECB">Built on LangGraph, deepagents, langstage-core.</text>

  <g font-family="'SF Mono','JetBrains Mono','Consolas',monospace" font-size="13" fill="#7C7FA6">
    <text x="72" y="278">reflection</text>
    <text x="172" y="278" fill="#45487A">&#8226;</text>
    <text x="190" y="278">skills</text>
    <text x="248" y="278" fill="#45487A">&#8226;</text>
    <text x="266" y="278">memory</text>
    <text x="338" y="278" fill="#45487A">&#8226;</text>
    <text x="356" y="278">FTS5 recall</text>
    <text x="448" y="278" fill="#45487A">&#8226;</text>
    <text x="466" y="278">cron</text>
  </g>

  <!-- ===== right: closed-loop diagram (3 pills + loop-back arc) ===== -->
  <g transform="translate(720, 70)">

    <!-- Section eyebrow + caption pair, stacked above the arc apex.
         Two short lines read better than one long italic phrase trapped
         inside the curve geometry. -->
    <text x="275" y="2" font-family="'SF Mono','Consolas',monospace" font-size="11"
          fill="#A6AECB" letter-spacing="2" text-anchor="middle">REFLECTION LOOP</text>
    <text x="275" y="22" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="12"
          fill="#7C7FA6" text-anchor="middle">writes that load back into the next session</text>

    <!-- Loop-back arc above the pills.
         Path goes from above the right pill (490, 158) up and over to
         above the left pill (60, 158). The marker-end ends pointing
         down (the path's final tangent at (60, 158) is vertical), so
         the arrow lands clean on the top of the left pill. Apex sits
         at y≈58, comfortably below the caption pair above. -->
    <path d="M 490 158
             C 490 58, 60 58, 60 158"
          stroke="url(#accent)" stroke-width="2.5" stroke-dasharray="6 4"
          fill="none" marker-end="url(#arrow-accent)"
          opacity="0.9"/>

    <!-- Three pills, horizontal flow ─────────────────────────────────── -->
    <!-- Pill 1: TURNS (blue family) -->
    <g transform="translate(0, 168)">
      <rect width="130" height="44" rx="12" fill="#10243A" stroke="#2F9BFF" stroke-width="1.5"/>
      <circle cx="18" cy="22" r="5" fill="#2F9BFF"/>
      <text x="32" y="28" font-family="'SF Mono','Consolas',monospace" font-size="14" fill="#8FC4FF">turns</text>
    </g>

    <!-- Arrow: TURNS → REFLECT -->
    <line x1="135" y1="190" x2="175" y2="190" stroke="url(#accent)" stroke-width="2.5"/>
    <path d="M 175 190 l -10 -5 v 10 z" fill="#34D6C8"/>

    <!-- Pill 2: REFLECT (highlighted — the differentiator) -->
    <g transform="translate(180, 168)">
      <rect width="140" height="44" rx="12" fill="#1A1535" stroke="url(#accent)" stroke-width="2"/>
      <circle cx="18" cy="22" r="5" fill="url(#accent)"/>
      <text x="32" y="28" font-family="'SF Mono','Consolas',monospace" font-size="14" font-weight="600" fill="#C9BEFF">reflect</text>
    </g>

    <!-- Arrow: REFLECT → WRITE -->
    <line x1="325" y1="190" x2="365" y2="190" stroke="url(#accent)" stroke-width="2.5"/>
    <path d="M 365 190 l -10 -5 v 10 z" fill="#34D6C8"/>

    <!-- Pill 3: SKILL / MEMORY (teal family) -->
    <g transform="translate(370, 168)">
      <rect width="160" height="44" rx="12" fill="#0C2A22" stroke="#34D6C8" stroke-width="1.5"/>
      <circle cx="18" cy="22" r="5" fill="#34D6C8"/>
      <text x="32" y="28" font-family="'SF Mono','Consolas',monospace" font-size="13" fill="#7FE3D6">SKILL &#183; MEMORY</text>
    </g>

  </g>
</svg>
