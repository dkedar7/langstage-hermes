# deepagent-hermes example configuration.
# Place this at the project root or copy to ~/.deepagent-hermes/config.toml for global.
# Resolution: defaults < this TOML < DEEPAGENT_HERMES_* env vars < CLI overrides.

[model]
default = "anthropic:claude-sonnet-4-6"
provider = "auto"
# context_length = 200000
# max_tokens = 8192
aux_model = "anthropic:claude-haiku-4-5-20251001"

[agent]
api_max_retries = 3
max_iterations = 90
delegation_max_iterations = 50
task_completion_guidance = true
environment_probe = true
tool_use_enforcement = "auto"
disabled_toolsets = []

[memory]
memory_enabled = true
user_profile_enabled = true
nudge_interval = 10
memory_char_limit = 2200
user_char_limit = 1375
provider = ""

[skills]
creation_nudge_interval = 10
external_dirs = []
disabled = []

[skills.platform_disabled]
# telegram = ["foo-skill"]

[compression]
enabled = true
threshold = 0.50
target_ratio = 0.20
protect_first_n = 3
protect_last_n = 20
abort_on_summary_failure = false

[delegation]
max_concurrent_children = 4
max_spawn_depth = 3
max_iterations = 50

[curator]
enabled = true
interval_hours = 168
min_idle_hours = 2
stale_after_days = 30
archive_after_days = 90
prune_builtins = true

[cron]
tick_seconds = 60

[plugins]
enabled = []
disabled = []
